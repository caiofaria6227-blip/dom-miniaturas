<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DOM Miniaturas</title>

<link rel="manifest" href="manifest.json">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js"></script>

<style>
body{
font-family:Arial;
background:#1b3a2f;
color:white;
margin:0;
padding:20px;
}

h1{
text-align:center;
color:#4CAF50;
}

.card{
background:#244f3f;
padding:15px;
margin-bottom:15px;
border-radius:10px;
}

input, select{
width:100%;
padding:8px;
margin:5px 0;
border-radius:5px;
border:none;
}

button{
padding:10px;
margin-top:5px;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

.btn{
background:#4CAF50;
color:white;
}

.btn-danger{
background:#b33939;
color:white;
}

canvas{
background:#244f3f;
border-radius:10px;
margin-top:20px;
}
</style>
</head>

<body>

<h1>DOM Miniaturas</h1>

<div class="card">
<h2>Adicionar Estoque</h2>

<input id="nome" placeholder="Nome da mini">
<select id="linha">
<option>Mainline</option>
<option>T-Hunt</option>
<option>Super T-Hunt</option>
<option>Silver Series</option>
<option>Premium</option>
</select>

<input id="valorPago" type="number" placeholder="Valor pago">
<input id="valorVenda" type="number" placeholder="Valor desejado venda">
<input id="quantidade" type="number" placeholder="Quantidade">

<button class="btn" onclick="addEstoque()">Cadastrar</button>
</div>

<div class="card">
<h2>Resumo</h2>
<p id="lucroReal">Lucro Real: R$ 0</p>
<p id="potencial">Potencial em Estoque: R$ 0</p>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyAiqv-9d2bUufI6Ez3TybX4gnX9b1ybBkk",
authDomain: "dom-miniaturas.firebaseapp.com",
projectId: "dom-miniaturas",
storageBucket: "dom-miniaturas.firebasestorage.app",
messagingSenderId: "460160940862",
appId: "1:460160940862:web:bd8f4e092f12e407428a6f"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.addEstoque = async function(){
const nome = document.getElementById("nome").value;
const linha = document.getElementById("linha").value;
const valorPago = parseFloat(document.getElementById("valorPago").value);
const valorVenda = parseFloat(document.getElementById("valorVenda").value);
const quantidade = parseInt(document.getElementById("quantidade").value);

await addDoc(collection(db, "estoque"), {
nome, linha, valorPago, valorVenda, quantidade
});

alert("Mini cadastrada com backup na nuvem!");
calcular();
}

async function calcular(){
let potencial = 0;

const querySnapshot = await getDocs(collection(db, "estoque"));
querySnapshot.forEach((doc)=>{
const data = doc.data();
potencial += data.valorVenda * data.quantidade;
});

document.getElementById("potencial").innerText =
"Potencial em Estoque: R$ " + potencial.toFixed(2);
}

calcular();

</script>

</body>
</html>
