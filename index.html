<script>

let minis = JSON.parse(localStorage.getItem("domMiniaturas")) || [];
let vendas = JSON.parse(localStorage.getItem("domVendas")) || [];

let editIndex = null;
let mostrarCusto = false;
let graficoInvest;
let graficoLucro;

function salvarLocal(){
localStorage.setItem("domMiniaturas", JSON.stringify(minis));
localStorage.setItem("domVendas", JSON.stringify(vendas));
atualizarTela();
}

function limparCampos(){
document.getElementById("nome").value="";
document.getElementById("custo").value="";
document.getElementById("venda").value="";
document.getElementById("quantidade").value="";
document.getElementById("foto").value="";
editIndex=null;
document.getElementById("titulo-form").innerText="Adicionar Miniatura";
}

function revelarCustos(){
const senha = prompt("Digite a senha:");
if(senha==="DOM"){
mostrarCusto = !mostrarCusto;
atualizarTela();
}else{
alert("Senha incorreta");
}
}

function salvarMini(){

const nome = document.getElementById("nome").value.trim();
const tipo = document.getElementById("tipo").value;
const custo = Number(document.getElementById("custo").value) || 0;
const venda = Number(document.getElementById("venda").value);
const quantidade = Number(document.getElementById("quantidade").value);
const fotoInput = document.getElementById("foto");

if(!nome || isNaN(venda) || isNaN(quantidade)){
alert("Preencha nome, valor venda e quantidade.");
return;
}

const concluir = (fotoBase64)=>{
let fotoFinal = fotoBase64;
if(editIndex!==null && !fotoBase64){
fotoFinal=minis[editIndex].foto;
}

const obj={nome,tipo,custo,venda,quantidade,foto:fotoFinal};

if(editIndex!==null){
minis[editIndex]=obj;
}else{
minis.push(obj);
}

limparCampos();
salvarLocal();
};

if(fotoInput.files.length>0){
const reader=new FileReader();
reader.onload=e=>concluir(e.target.result);
reader.readAsDataURL(fotoInput.files[0]);
}else{
concluir(null);
}
}

function vender(index){

const mini = minis[index];

if(mini.quantidade<=0){
alert("Sem estoque.");
return;
}

const cliente = prompt("Nome do cliente:");
if(!cliente) return;

const data = prompt("Data da venda (DD/MM/AAAA):");
if(!data) return;

let valorVenda = Number(prompt("Valor da venda:", mini.venda));
if(isNaN(valorVenda)) return;

const lucro = valorVenda - mini.custo;

vendas.push({
nome:mini.nome,
cliente,
data,
valor:valorVenda,
lucro,
tipo:mini.tipo
});

mini.quantidade--;

salvarLocal();
}

function editar(index){
const mini = minis[index];

document.getElementById("nome").value=mini.nome;
document.getElementById("tipo").value=mini.tipo;
document.getElementById("custo").value=mini.custo;
document.getElementById("venda").value=mini.venda;
document.getElementById("quantidade").value=mini.quantidade;

editIndex=index;
document.getElementById("titulo-form").innerText="Editando Miniatura";
}

function excluir(index){
if(confirm("Excluir miniatura?")){
minis.splice(index,1);
salvarLocal();
}
}

function editarVenda(index){

const vendaObj = vendas[index];

const novoCliente = prompt("Cliente:", vendaObj.cliente);
if(!novoCliente) return;

const novaData = prompt("Data (DD/MM/AAAA):", vendaObj.data);
if(!novaData) return;

let novoValor = Number(prompt("Valor:", vendaObj.valor));
if(isNaN(novoValor)) return;

vendaObj.cliente = novoCliente;
vendaObj.data = novaData;
vendaObj.valor = novoValor;

const mini = minis.find(m=>m.nome===vendaObj.nome);
if(mini){
vendaObj.lucro = novoValor - mini.custo;
}

salvarLocal();
}

function excluirVenda(index){
if(confirm("Excluir venda?")){
vendas.splice(index,1);
salvarLocal();
}
}

function atualizarTela(){

const lista=document.getElementById("lista");
const rankingDiv=document.getElementById("ranking");
const listaVendas=document.getElementById("listaVendas");
const filtroMes=document.getElementById("filtroMes").value;

lista.innerHTML="";
rankingDiv.innerHTML="";
listaVendas.innerHTML="";

let totalInvestido=0;
let ranking={};
let lucroPorMes={};
let mesesUnicos=new Set();

minis.forEach((mini,index)=>{

totalInvestido += (mini.custo||0) * (mini.quantidade||0);

if(!ranking[mini.tipo]) ranking[mini.tipo]=0;
ranking[mini.tipo]+= ((mini.venda||0)-(mini.custo||0))*(mini.quantidade||0);

lista.innerHTML+=`
<div class="card">
${mini.foto?`<img src="${mini.foto}">`:""}
<h4>${mini.nome}</h4>
<p><b>${mini.tipo}</b></p>
<p>Venda: R$ ${(mini.venda||0).toFixed(2)}</p>
<p>Custo: ${mostrarCusto?"R$ "+(mini.custo||0).toFixed(2):"****"}</p>
<p>Qtd: ${mini.quantidade}</p>
<button class="btn-sell" onclick="vender(${index})">Vendido</button>
<button class="btn-edit" onclick="editar(${index})">Editar</button>
<button class="btn-danger" onclick="excluir(${index})">Excluir</button>
</div>`;
});

vendas.forEach((v,i)=>{

const partes=v.data.split("/");
if(partes.length===3){
const mesAno=partes[1]+"/"+partes[2];
mesesUnicos.add(mesAno);
if(!lucroPorMes[mesAno]) lucroPorMes[mesAno]=0;
lucroPorMes[mesAno]+=v.lucro||0;
}

if(filtroMes==="Todos" || filtroMes===partes[1]+"/"+partes[2]){
listaVendas.innerHTML+=`
<div class="card">
<p><b>${v.nome}</b></p>
<p>Cliente: ${v.cliente}</p>
<p>Data: ${v.data}</p>
<p>Valor: R$ ${(v.valor||0).toFixed(2)}</p>
<p>Lucro: R$ ${(v.lucro||0).toFixed(2)}</p>
<button class="btn-edit" onclick="editarVenda(${i})">Editar</button>
<button class="btn-danger" onclick="excluirVenda(${i})">Excluir</button>
</div>`;
}
});

const filtroSelect=document.getElementById("filtroMes");
const mesSelecionado=filtroMes;
filtroSelect.innerHTML='<option value="Todos">Todos os meses</option>';
[...mesesUnicos].sort().forEach(m=>{
filtroSelect.innerHTML+=`<option value="${m}">${m}</option>`;
});
filtroSelect.value=mesSelecionado;

Object.entries(ranking)
.sort((a,b)=>b[1]-a[1])
.forEach(([linha,valor])=>{
rankingDiv.innerHTML+=`<p>${linha}: R$ ${valor.toFixed(2)}</p>`;
});

atualizarGraficos(totalInvestido,lucroPorMes);
}

function atualizarGraficos(totalInvestido,lucroPorMes){

const ctx1=document.getElementById("graficoInvestimento").getContext("2d");
if(graficoInvest) graficoInvest.destroy();
graficoInvest=new Chart(ctx1,{
type:"bar",
data:{labels:["Total Investido"],datasets:[{label:"R$",data:[totalInvestido]}]}
});

const ctx2=document.getElementById("graficoLucroMensal").getContext("2d");
if(graficoLucro) graficoLucro.destroy();
graficoLucro=new Chart(ctx2,{
type:"bar",
data:{labels:Object.keys(lucroPorMes),datasets:[{label:"Lucro R$",data:Object.values(lucroPorMes)}]}
});
}

async function gerarPDF(){
const { jsPDF } = window.jspdf;
const doc = new jsPDF();
let y=10;
doc.text("Relatório DOM Miniaturas",10,y);
y+=10;

minis.forEach(m=>{
doc.text(`${m.nome} - Estoque: ${m.quantidade}`,10,y);
y+=8;
});

doc.save("relatorio-dom-miniaturas.pdf");
}

atualizarTela();

if("serviceWorker" in navigator){
navigator.serviceWorker.register("sw.js");
}

</script>
