<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DOM Miniaturas</title>

<link rel="manifest" href="manifest.json">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#1f3d2b;
    color:white;
}
header{
    background:#14281d;
    padding:15px;
    text-align:center;
    font-size:22px;
    font-weight:bold;
}
.container{ padding:15px; }

input, select{
    width:100%;
    padding:8px;
    margin-bottom:10px;
    border:none;
    border-radius:8px;
}

button{
    padding:10px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    margin:5px 0;
    font-weight:bold;
}

.btn-primary{ background:#f4c430; }
.btn-danger{ background:#c0392b; color:white; }
.btn-edit{ background:#3498db; color:white; }
.btn-sell{ background:#27ae60; color:white; }

.card{
    background:#2e5b3c;
    padding:10px;
    border-radius:12px;
    margin-bottom:10px;
}

img{
    width:100%;
    border-radius:8px;
}

canvas{
    background:white;
    border-radius:10px;
    padding:10px;
}
</style>
</head>
<body>

<header>DOM MINIATURAS</header>

<div class="container">

<h3>Adicionar Miniatura</h3>

<input type="text" id="nome" placeholder="Nome">

<select id="linha">
<option>Mainline</option>
<option>Premium</option>
<option>Silver Series</option>
<option>Super Treasure Hunt</option>
<option>Treasure Hunt</option>
<option>Boulevard</option>
<option>Car Culture</option>
<option>Team Transport</option>
<option>Fast & Furious</option>
<option>Matchbox</option>
<option>Outras</option>
</select>

<input type="number" id="valor" placeholder="Valor">
<input type="number" id="quantidade" placeholder="Quantidade">
<input type="file" id="foto">

<button class="btn-primary" onclick="salvarMini()">Salvar</button>

<hr>

<h3>Buscar / Filtrar</h3>
<input type="text" id="busca" placeholder="Buscar por nome" onkeyup="atualizarTela()">

<select id="filtroLinha" onchange="atualizarTela()">
<option value="">Todas as linhas</option>
<option>Mainline</option>
<option>Premium</option>
<option>Silver Series</option>
<option>Super Treasure Hunt</option>
<option>Treasure Hunt</option>
<option>Boulevard</option>
<option>Car Culture</option>
<option>Team Transport</option>
<option>Fast & Furious</option>
<option>Matchbox</option>
<option>Outras</option>
</select>

<hr>

<h3>Marketplace</h3>
<div id="lista"></div>

<hr>

<h3>📊 Potencial de Vendas</h3>
<p id="totalEstoque"></p>
<canvas id="grafico"></canvas>

<hr>

<button class="btn-primary" onclick="exportarBackup()">📥 Backup JSON</button>
<button class="btn-primary" onclick="gerarPDF()">📄 Gerar Relatório PDF</button>
<input type="file" onchange="importarBackup(event)">

</div>

<script>
let minis = JSON.parse(localStorage.getItem("domMiniaturas")) || [];
let editIndex = null;

function salvarLocal(){
    localStorage.setItem("domMiniaturas", JSON.stringify(minis));
    atualizarTela();
}

function salvarMini(){
    const nome = nomeInput.value;
    const linha = linhaInput.value;
    const valor = parseFloat(valorInput.value);
    const quantidade = parseInt(quantidadeInput.value);
    const fotoInput = document.getElementById("foto");

    const reader = new FileReader();
    reader.onload = function(){
        const nova = {nome, linha, valor, quantidade, foto: reader.result};

        if(editIndex !== null){
            minis[editIndex] = nova;
            editIndex = null;
        } else {
            minis.push(nova);
        }

        salvarLocal();
        limpar();
    }

    if(fotoInput.files[0]){
        reader.readAsDataURL(fotoInput.files[0]);
    } else {
        reader.onload();
    }
}

function atualizarTela(){
    const lista = document.getElementById("lista");
    const busca = document.getElementById("busca").value.toLowerCase();
    const filtro = document.getElementById("filtroLinha").value;

    lista.innerHTML="";
    let total=0;

    minis
    .filter(m => 
        m.nome.toLowerCase().includes(busca) &&
        (filtro=="" || m.linha==filtro)
    )
    .forEach((mini,index)=>{
        total += mini.valor * mini.quantidade;

        lista.innerHTML+=`
        <div class="card">
            ${mini.foto? `<img src="${mini.foto}">`:""}
            <h4>${mini.nome}</h4>
            <p>${mini.linha}</p>
            <p>R$ ${mini.valor}</p>
            <p>Qtd: ${mini.quantidade}</p>
            <button class="btn-sell" onclick="vender(${index})">Vendido</button>
            <button class="btn-edit" onclick="editar(${index})">Editar</button>
            <button class="btn-danger" onclick="excluir(${index})">Excluir</button>
        </div>`;
    });

    totalEstoque.innerText="Total projetado: R$ "+total.toFixed(2);
    atualizarGrafico(total);
}

function vender(i){
    if(minis[i].quantidade>0){
        minis[i].quantidade--;
        salvarLocal();
    }
}

function editar(i){
    const m=minis[i];
    nomeInput.value=m.nome;
    linhaInput.value=m.linha;
    valorInput.value=m.valor;
    quantidadeInput.value=m.quantidade;
    editIndex=i;
}

function excluir(i){
    minis.splice(i,1);
    salvarLocal();
}

function limpar(){
    nomeInput.value="";
    valorInput.value="";
    quantidadeInput.value="";
    foto.value="";
}

let grafico;
function atualizarGrafico(total){
    if(grafico) grafico.destroy();
    grafico=new Chart(grafico,{
        type:"bar",
        data:{
            labels:["Estoque"],
            datasets:[{label:"R$",data:[total]}]
        }
    });
}

function exportarBackup(){
    const blob=new Blob([JSON.stringify(minis)],{type:"application/json"});
    const a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download="backup-dom-miniaturas.json";
    a.click();
}

function importarBackup(e){
    const file=e.target.files[0];
    const reader=new FileReader();
    reader.onload=()=>{
        minis=JSON.parse(reader.result);
        salvarLocal();
    }
    reader.readAsText(file);
}

async function gerarPDF(){
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    let y=10;
    doc.text("Relatório DOM Miniaturas",10,y);
    y+=10;

    minis.forEach(m=>{
        doc.text(`${m.nome} - ${m.linha} - R$${m.valor} x ${m.quantidade}`,10,y);
        y+=8;
    });

    doc.save("relatorio-dom-miniaturas.pdf");
}

atualizarTela();
</script>

</body>
</html>
