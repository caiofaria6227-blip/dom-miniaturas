<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>DOM Miniaturas</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    font-family:Arial;
    margin:0;
    background:#111;
    color:white;
}

header{
    background:#2ecc71;
    padding:15px;
    text-align:center;
    font-weight:bold;
}

button{
    margin:5px;
    padding:8px;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

.btn-danger{background:#e74c3c;color:white;}
.btn-edit{background:#3498db;color:white;}
.btn-sell{background:#f1c40f;}

.card{
    background:#222;
    padding:10px;
    margin:10px;
    border-radius:8px;
}

img{
    width:100%;
    max-height:180px;
    object-fit:cover;
    border-radius:5px;
}

input, select{
    width:100%;
    margin:5px 0;
    padding:6px;
}

canvas{
    background:white;
    border-radius:10px;
}
</style>
</head>
<body>

<header>
DOM MINIATURAS
<br>
<button onclick="ativarCliente()">Modo Cliente</button>
<button onclick="ativarAdmin()">Modo Admin</button>
</header>

<div style="padding:10px;">

<h3>Adicionar Mini</h3>

<input id="nome" placeholder="Nome">
<select id="linha">
<option>Mainline</option>
<option>Premium</option>
<option>Silver</option>
<option>Temáticos</option>
</select>
<input id="valor" type="number" placeholder="Valor de venda">
<input id="custo" type="number" placeholder="Custo">
<input id="quantidade" type="number" placeholder="Quantidade">
<input id="foto" type="file">
<button onclick="adicionar()">Adicionar</button>

<h3 id="totalEstoque"></h3>
<h3 id="lucroTotal"></h3>

<canvas id="grafico"></canvas>

<h3>Ranking de Lucro</h3>
<div id="ranking"></div>

<h3>Catálogo</h3>
<div id="lista"></div>

</div>

<script>
let minis = JSON.parse(localStorage.getItem("minis")) || [];
let modo = "admin";
let grafico;

function salvar(){
    localStorage.setItem("minis",JSON.stringify(minis));
}

function ativarCliente(){
    modo="cliente";
    atualizarTela();
}

function ativarAdmin(){
    const senha=prompt("Digite a senha:");
    if(senha==="DOM"){
        modo="admin";
        atualizarTela();
    }else{
        alert("Senha incorreta!");
    }
}

function adicionar(){
    const nome=document.getElementById("nome").value;
    const linha=document.getElementById("linha").value;
    const valor=parseFloat(document.getElementById("valor").value);
    const custo=parseFloat(document.getElementById("custo").value);
    const quantidade=parseInt(document.getElementById("quantidade").value);
    const fotoInput=document.getElementById("foto");

    if(!nome || !valor || !custo || !quantidade) return;

    const reader=new FileReader();
    reader.onload=function(){
        minis.push({
            nome,linha,valor,custo,quantidade,
            foto:reader.result,
            vendidos:[]
        });
        salvar();
        atualizarTela();
    }

    if(fotoInput.files[0]){
        reader.readAsDataURL(fotoInput.files[0]);
    }else{
        minis.push({nome,linha,valor,custo,quantidade,foto:null,vendidos:[]});
        salvar();
        atualizarTela();
    }
}

function excluir(i){
    minis.splice(i,1);
    salvar();
    atualizarTela();
}

function editar(i){
    const novoNome=prompt("Novo nome:",minis[i].nome);
    if(novoNome){
        minis[i].nome=novoNome;
        salvar();
        atualizarTela();
    }
}

function abrirPopup(i){
    const cliente=prompt("Nome do cliente:");
    if(!cliente) return;

    const data=new Date().toLocaleDateString();

    if(minis[i].quantidade>0){
        minis[i].quantidade--;
        minis[i].vendidos.push({cliente,data});
        salvar();
        atualizarTela();
    }else{
        alert("Sem estoque!");
    }
}

function atualizarGrafico(estoque,lucro){
    const ctx=document.getElementById("grafico");

    if(grafico) grafico.destroy();

    grafico=new Chart(ctx,{
        type:"bar",
        data:{
            labels:["Estoque Potencial","Lucro Real"],
            datasets:[{
                label:"Financeiro",
                data:[estoque,lucro]
            }]
        }
    });
}

function atualizarTela(){
    const lista=document.getElementById("lista");
    const ranking=document.getElementById("ranking");

    lista.innerHTML="";
    ranking.innerHTML="";

    let totalEstoque=0;
    let lucroReal=0;
    let lucroLinha={};

    minis.forEach((mini,i)=>{

        if(!mini.vendidos) mini.vendidos=[];

        totalEstoque+=mini.valor*mini.quantidade;

        mini.vendidos.forEach(()=>{
            const lucro=mini.valor-mini.custo;
            lucroReal+=lucro;
            lucroLinha[mini.linha]=(lucroLinha[mini.linha]||0)+lucro;
        });

        if(modo==="cliente"){
            lista.innerHTML+=`
            <div class="card">
            ${mini.foto?`<img src="${mini.foto}">`:""}
            <h4>${mini.nome}</h4>
            <p>${mini.linha}</p>
            <p>R$ ${mini.valor.toFixed(2)}</p>
            <p>Disponível: ${mini.quantidade}</p>
            </div>`;
        }else{
            lista.innerHTML+=`
            <div class="card">
            ${mini.foto?`<img src="${mini.foto}">`:""}
            <h4>${mini.nome}</h4>
            <p>${mini.linha}</p>
            <p>Venda: R$ ${mini.valor.toFixed(2)}</p>
            <p>Custo: R$ ${mini.custo.toFixed(2)}</p>
            <p>Qtd: ${mini.quantidade}</p>
            <p>Vendidos: ${mini.vendidos.length}</p>
            <button class="btn-sell" onclick="abrirPopup(${i})">Vendido</button>
            <button class="btn-edit" onclick="editar(${i})">Editar</button>
            <button class="btn-danger" onclick="excluir(${i})">Excluir</button>
            </div>`;
        }

    });

    if(modo==="admin"){
        document.getElementById("totalEstoque").innerText="Estoque Potencial: R$ "+totalEstoque.toFixed(2);
        document.getElementById("lucroTotal").innerText="Lucro Real: R$ "+lucroReal.toFixed(2);

        const ordenado=Object.entries(lucroLinha).sort((a,b)=>b[1]-a[1]);

        ordenado.forEach((item,pos)=>{
            ranking.innerHTML+=`
            <div class="card">
            <h4>${pos+1}º - ${item[0]}</h4>
            <p>Lucro: R$ ${item[1].toFixed(2)}</p>
            </div>`;
        });

        atualizarGrafico(totalEstoque,lucroReal);
    }else{
        document.getElementById("totalEstoque").innerText="";
        document.getElementById("lucroTotal").innerText="";
        ranking.innerHTML="";
        if(grafico) grafico.destroy();
    }
}

atualizarTela();
</script>

</body>
</html>
