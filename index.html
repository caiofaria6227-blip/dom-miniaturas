<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DOM Miniaturas</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#14532d">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(to right,#0f2027,#203a43,#2c5364);
color:white;
}
header{
background:#14532d;
padding:15px;
text-align:center;
font-size:22px;
font-weight:bold;
}
.container{padding:15px;}
input,select{
width:100%;
padding:8px;
margin-bottom:10px;
border:none;
border-radius:8px;
}
button{
padding:8px;
border:none;
border-radius:8px;
cursor:pointer;
margin:4px 2px;
font-weight:bold;
}
.btn-primary{background:#2ecc71;color:white;}
.btn-danger{background:#c0392b;color:white;}
.btn-edit{background:#3498db;color:white;}
.btn-sell{background:#27ae60;color:white;}
.btn-view{background:#f1c40f;}
.card{
background:#166534;
padding:10px;
border-radius:12px;
margin-bottom:10px;
}
.card img{
width:90px;
border-radius:8px;
margin-bottom:8px;
}
canvas{
background:white;
border-radius:10px;
padding:10px;
margin-bottom:20px;
}
</style>
</head>
<body>

<header>DOM MINIATURAS</header>

<div class="container">

<h3 id="tituloForm">Adicionar Miniatura</h3>

<input type="text" id="nome" placeholder="Nome">

<select id="tipo">
<option>Mainline</option>
<option>Premium</option>
<option>Silver Series</option>
<option>Super Treasure Hunt</option>
<option>Treasure Hunt</option>
<option>Temáticos</option>
<option>Boulevard</option>
<option>Car Culture</option>
<option>Team Transport</option>
<option>Fast & Furious</option>
<option>Matchbox</option>
<option>Outras</option>
</select>

<input type="number" id="custo" placeholder="Custo">
<input type="number" id="venda" placeholder="Valor de venda">
<input type="number" id="quantidade" placeholder="Quantidade">
<input type="file" id="foto">

<button class="btn-primary" onclick="salvarMini()">Adicionar</button>
<button class="btn-view" onclick="revelarCustos()">👁 Ver custos</button>
<button class="btn-primary" onclick="gerarPDF()">📄 Gerar PDF</button>

<hr>

<h3>Filtrar por Tipo</h3>
<select id="filtroTipo" onchange="atualizarTela()">
<option value="Todos">Todos</option>
<option>Mainline</option>
<option>Premium</option>
<option>Silver Series</option>
<option>Super Treasure Hunt</option>
<option>Treasure Hunt</option>
<option>Temáticos</option>
<option>Boulevard</option>
<option>Car Culture</option>
<option>Team Transport</option>
<option>Fast & Furious</option>
<option>Matchbox</option>
<option>Outras</option>
</select>

<hr>
<div id="lista"></div>

<hr>

<h3>📊 Total Investido no Estoque</h3>
<canvas id="graficoInvestimento"></canvas>

<h3>📅 Lucro Real por Mês</h3>
<canvas id="graficoLucroMensal"></canvas>

<hr>

<h3>🏆 Ranking de Lucro por Linha (Vendas)</h3>
<div id="ranking"></div>

<hr>
<h3>📄 Histórico de Vendas</h3>

<select id="filtroMesVendas" onchange="atualizarTela()">
<option value="Todos">Todas as vendas</option>
</select>

<div id="listaVendas"></div>
<h3>📄 Histórico de Vendas</h3>
<div id="listaVendas"></div>

</div>

<script>

let minis = JSON.parse(localStorage.getItem("domMiniaturas")) || [];
let vendas = JSON.parse(localStorage.getItem("domVendas")) || [];
let mostrarCusto = false;
let editIndex = null;
let editVendaIndex = null;
let graficoInvest;
let graficoLucro;

function salvarLocal(){
localStorage.setItem("domMiniaturas", JSON.stringify(minis));
localStorage.setItem("domVendas", JSON.stringify(vendas));
atualizarTela();
}

function revelarCustos(){
const senha = prompt("Digite a senha:");
if(senha==="DOM"){
mostrarCusto=!mostrarCusto;
atualizarTela();
}else{
alert("Senha incorreta");
}
}

function salvarMini(){

const nome=document.getElementById("nome").value.trim();
const tipo=document.getElementById("tipo").value;
const custo=Number(document.getElementById("custo").value)||0;
const venda=Number(document.getElementById("venda").value);
const quantidade=Number(document.getElementById("quantidade").value);
const fotoInput=document.getElementById("foto");

if(!nome || isNaN(venda) || isNaN(quantidade)){
alert("Preencha nome, valor venda e quantidade.");
return;
}

const concluir=(fotoBase64)=>{

const obj={nome,tipo,custo,venda,quantidade,foto:fotoBase64};

if(editIndex!==null){
minis[editIndex]=obj;
editIndex=null;
document.getElementById("tituloForm").innerText="Adicionar Miniatura";
}else{
minis.push(obj);
}

document.querySelectorAll("input").forEach(i=>i.value="");
salvarLocal();
};

if(fotoInput.files.length>0){
const reader=new FileReader();
reader.onload=e=>concluir(e.target.result);
reader.readAsDataURL(fotoInput.files[0]);
}else{
concluir(editIndex!==null?minis[editIndex].foto:null);
}
}

function editar(index){
const mini=minis[index];
editIndex=index;

document.getElementById("nome").value=mini.nome;
document.getElementById("tipo").value=mini.tipo;
document.getElementById("custo").value=mini.custo;
document.getElementById("venda").value=mini.venda;
document.getElementById("quantidade").value=mini.quantidade;

document.getElementById("tituloForm").innerText="Editando Miniatura";
window.scrollTo(0,0);
}

function vender(index){

const mini=minis[index];
if(mini.quantidade<=0){ alert("Sem estoque."); return; }

const cliente=prompt("Cliente:");
if(!cliente) return;

const data=prompt("Data (DD/MM/AAAA):");
if(!data) return;

let valorVenda=Number(prompt("Valor da venda:",mini.venda));
if(isNaN(valorVenda)) return;

const lucro=valorVenda-mini.custo;

vendas.push({nome:mini.nome,cliente,data,valor:valorVenda,lucro,tipo:mini.tipo});
mini.quantidade--;

salvarLocal();
}

function editarVenda(index){

const venda=vendas[index];

const cliente=prompt("Cliente:",venda.cliente);
if(!cliente) return;

const data=prompt("Data (DD/MM/AAAA):",venda.data);
if(!data) return;

const valor=Number(prompt("Valor:",venda.valor));
if(isNaN(valor)) return;

venda.cliente=cliente;
venda.data=data;
venda.valor=valor;
venda.lucro=valor - (venda.valor - venda.lucro);

salvarLocal();
}

function excluir(index){
if(confirm("Excluir miniatura?")){
minis.splice(index,1);
salvarLocal();
}
}

function excluirVenda(index){
if(confirm("Excluir venda?")){
vendas.splice(index,1);
salvarLocal();
}
}

function atualizarTela(){

const lista=document.getElementById("lista");
const rankingDiv=document.getElementById("ranking");
const listaVendas=document.getElementById("listaVendas");
const filtroTipo=document.getElementById("filtroTipo").value;
const filtroMesVendas=document.getElementById("filtroMesVendas").value;

lista.innerHTML="";
rankingDiv.innerHTML="";
listaVendas.innerHTML="";

let totalInvestido=0;
let ranking={};
let lucroPorMes={};
let mesesUnicos=new Set();


// ===== MINIATURAS =====
minis.forEach((mini,index)=>{

if(filtroTipo==="Todos" || mini.tipo===filtroTipo){

totalInvestido+=mini.custo*mini.quantidade;

lista.innerHTML+=`
<div class="card">
${mini.foto?`<img src="${mini.foto}">`:""}
<h4>${mini.nome}</h4>
<p><b>${mini.tipo}</b></p>
<p>Venda: R$ ${mini.venda.toFixed(2)}</p>
<p>Custo: ${mostrarCusto?"R$ "+mini.custo.toFixed(2):"****"}</p>
<p>Qtd: ${mini.quantidade}</p>
<button class="btn-sell" onclick="vender(${index})">Vendido</button>
<button class="btn-edit" onclick="editar(${index})">Editar</button>
<button class="btn-danger" onclick="excluir(${index})">Excluir</button>
</div>`;
}
});


// ===== VENDAS =====
vendas.forEach((v,i)=>{

if(!ranking[v.tipo]) ranking[v.tipo]=0;
ranking[v.tipo]+=v.lucro;

const partes=v.data.split("/");
if(partes.length===3){

const mesAno=partes[1]+"/"+partes[2];
mesesUnicos.add(mesAno);

if(!lucroPorMes[mesAno]) lucroPorMes[mesAno]=0;
lucroPorMes[mesAno]+=v.lucro;


// FILTRO APLICADO SOMENTE NAS VENDAS
if(filtroMesVendas==="Todos" || filtroMesVendas===mesAno){

listaVendas.innerHTML+=`
<div class="card">
<p><b>${v.nome}</b></p>
<p>Cliente: ${v.cliente}</p>
<p>Data: ${v.data}</p>
<p>Valor: R$ ${v.valor.toFixed(2)}</p>
<p>Lucro: R$ ${v.lucro.toFixed(2)}</p>
<button class="btn-edit" onclick="editarVenda(${i})">Editar</button>
<button class="btn-danger" onclick="excluirVenda(${i})">Excluir</button>
</div>`;
}

}
});


// ===== POPULAR FILTRO DE VENDAS =====
const selectVendas=document.getElementById("filtroMesVendas");
const mesAtual=filtroMesVendas;

selectVendas.innerHTML='<option value="Todos">Todas as vendas</option>';

[...mesesUnicos].sort().forEach(m=>{
selectVendas.innerHTML+=`<option value="${m}">${m}</option>`;
});

selectVendas.value=mesAtual;


// ===== RANKING =====
Object.entries(ranking)
.sort((a,b)=>b[1]-a[1])
.forEach(([linha,valor])=>{
rankingDiv.innerHTML+=`<p>${linha}: R$ ${valor.toFixed(2)}</p>`;
});


// ===== GRÁFICOS (SEM FILTRO) =====
atualizarGraficos(totalInvestido,lucroPorMes);

}

function atualizarGraficos(totalInvestido,lucroPorMes){

const ctx1=document.getElementById("graficoInvestimento").getContext("2d");
if(graficoInvest) graficoInvest.destroy();
graficoInvest=new Chart(ctx1,{
type:"bar",
data:{labels:["Total Investido"],datasets:[{label:"R$",data:[totalInvestido]}]}
});

const ctx2=document.getElementById("graficoLucroMensal").getContext("2d");
if(graficoLucro) graficoLucro.destroy();
graficoLucro=new Chart(ctx2,{
type:"bar",
data:{labels:Object.keys(lucroPorMes),datasets:[{label:"Lucro R$",data:Object.values(lucroPorMes)}]}
});
}

async function gerarPDF(){
const { jsPDF } = window.jspdf;
const doc = new jsPDF();
let y=10;
doc.text("Relatório DOM Miniaturas",10,y);
y+=10;
minis.forEach(m=>{
doc.text(`${m.nome} - Estoque: ${m.quantidade}`,10,y);
y+=8;
});
doc.save("relatorio-dom-miniaturas.pdf");
}

atualizarTela();

if("serviceWorker" in navigator){
navigator.serviceWorker.register("sw.js");
}

</script>

</body>
</html>
