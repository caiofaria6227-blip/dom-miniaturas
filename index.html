<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DOM Miniaturas</title>
<link rel="manifest" href="manifest.json">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(to right,#0f2027,#203a43,#2c5364);
color:white;
}
header{
background:#14532d;
padding:15px;
text-align:center;
font-size:22px;
font-weight:bold;
}
.container{padding:15px;}
input,select{
width:100%;
padding:8px;
margin-bottom:10px;
border:none;
border-radius:8px;
}
button{
padding:8px;
border:none;
border-radius:8px;
cursor:pointer;
margin:4px 2px;
font-weight:bold;
}
.btn-primary{background:#2ecc71;color:white;}
.btn-danger{background:#c0392b;color:white;}
.btn-edit{background:#3498db;color:white;}
.btn-sell{background:#27ae60;color:white;}
.btn-view{background:#f1c40f;}
.card{
background:#166534;
padding:10px;
border-radius:12px;
margin-bottom:10px;
}
.card img{
width:100px;
border-radius:8px;
margin-bottom:8px;
}
canvas{
background:white;
border-radius:10px;
padding:10px;
}
</style>
</head>
<body>

<header>DOM MINIATURAS</header>

<div class="container">

<h3 id="titulo-form">Adicionar Miniatura</h3>

<input type="text" id="nome" placeholder="Nome">

<select id="tipo">
<option>Mainline</option>
<option>Premium</option>
<option>Silver Series</option>
<option>Super Treasure Hunt</option>
<option>Treasure Hunt</option>
<option>Temáticos</option>
<option>Boulevard</option>
<option>Car Culture</option>
<option>Team Transport</option>
<option>Fast & Furious</option>
<option>Matchbox</option>
<option>Outras</option>
</select>

<input type="number" id="custo" placeholder="Custo">
<input type="number" id="venda" placeholder="Valor de venda">
<input type="number" id="quantidade" placeholder="Quantidade">
<input type="file" id="foto">

<button class="btn-primary" onclick="salvarMini()">Adicionar</button>
<button class="btn-view" onclick="revelarCustos()">👁 Ver custos</button>

<hr>

<div id="lista"></div>

<hr>

<h3>📊 Investimento Total</h3>
<canvas id="graficoInvestimento"></canvas>

<h3>📈 Lucro Real por Mês</h3>
<canvas id="graficoLucro"></canvas>

<hr>

<h3>🧾 Vendas</h3>
<div id="listaVendas"></div>

</div>

<script>
let minis = JSON.parse(localStorage.getItem("domMiniaturas")) || [];
let vendas = JSON.parse(localStorage.getItem("domVendas")) || [];
let mostrarCusto = false;
let graficoInvestimento;
let graficoLucro;

/* ========================= */

function salvarDados(){
localStorage.setItem("domMiniaturas", JSON.stringify(minis));
localStorage.setItem("domVendas", JSON.stringify(vendas));
atualizarTela();
}

/* ========================= MINI ========================= */

function salvarMini(){

const nome = document.getElementById("nome").value.trim();
const tipo = document.getElementById("tipo").value;
const custo = Number(document.getElementById("custo").value)||0;
const venda = Number(document.getElementById("venda").value)||0;
const quantidade = Number(document.getElementById("quantidade").value)||0;
const fotoInput = document.getElementById("foto");

if(!nome || !venda || !quantidade){
alert("Preencha nome, valor venda e quantidade.");
return;
}

function finalizar(fotoBase64){

minis.push({
nome,
tipo,
custo,
venda,
quantidade,
foto: fotoBase64 || null
});

salvarDados();

document.getElementById("nome").value="";
document.getElementById("custo").value="";
document.getElementById("venda").value="";
document.getElementById("quantidade").value="";
document.getElementById("foto").value="";
}

if(fotoInput.files.length>0){
const reader = new FileReader();
reader.onload = e => finalizar(e.target.result);
reader.readAsDataURL(fotoInput.files[0]);
}else{
finalizar(null);
}
}

function vender(index){

if(minis[index].quantidade<=0){
alert("Sem estoque.");
return;
}

const cliente = prompt("Nome do cliente:");
if(!cliente) return;

const data = prompt("Data (DD/MM/AAAA):", new Date().toLocaleDateString("pt-BR"));
if(!data) return;

const valorFinal = prompt("Valor final da venda (permite desconto):", minis[index].venda);
if(!valorFinal) return;

const lucro = Number(valorFinal) - Number(minis[index].custo);

vendas.push({
nome:minis[index].nome,
cliente,
data,
lucro
});

minis[index].quantidade--;

salvarDados();
}

function excluir(index){
if(confirm("Excluir mini?")){
minis.splice(index,1);
salvarDados();
}
}

/* ========================= VENDAS ========================= */

function excluirVenda(index){
if(confirm("Excluir venda?")){
vendas.splice(index,1);
salvarDados();
}
}

/* ========================= GRÁFICOS ========================= */

function extrairMesAno(data){
const partes = data.split("/");
return partes[1]+"/"+partes[2];
}

function atualizarTela(){

const lista = document.getElementById("lista");
const listaVendas = document.getElementById("listaVendas");

lista.innerHTML="";
listaVendas.innerHTML="";

let investimento=0;

minis.forEach((m,i)=>{

investimento += m.custo * m.quantidade;

lista.innerHTML+=`
<div class="card">
${m.foto? `<img src="${m.foto}">`:""}
<h4>${m.nome}</h4>
<p>${m.tipo}</p>
<p>Venda: R$ ${Number(m.venda).toFixed(2)}</p>
<p>Custo: ${mostrarCusto? "R$ "+Number(m.custo).toFixed(2):"****"}</p>
<p>Qtd: ${m.quantidade}</p>
<button class="btn-sell" onclick="vender(${i})">Vendido</button>
<button class="btn-danger" onclick="excluir(${i})">Excluir</button>
</div>`;
});

/* Investimento */

if(graficoInvestimento) graficoInvestimento.destroy();
graficoInvestimento = new Chart(
document.getElementById("graficoInvestimento"),
{
type:"bar",
data:{
labels:["Investimento Total"],
datasets:[{label:"R$",data:[investimento]}]
}
});

/* Lucro mensal */

let lucroMes={};

vendas.forEach(v=>{
const mes = extrairMesAno(v.data);
if(!lucroMes[mes]) lucroMes[mes]=0;
lucroMes[mes]+=Number(v.lucro);
});

if(graficoLucro) graficoLucro.destroy();
graficoLucro = new Chart(
document.getElementById("graficoLucro"),
{
type:"line",
data:{
labels:Object.keys(lucroMes),
datasets:[{label:"Lucro Real",data:Object.values(lucroMes)}]
}
});

/* Lista vendas */

vendas.forEach((v,i)=>{
listaVendas.innerHTML+=`
<div class="card">
<h4>${v.nome}</h4>
<p>Cliente: ${v.cliente}</p>
<p>Data: ${v.data}</p>
<p>Lucro: R$ ${Number(v.lucro).toFixed(2)}</p>
<button class="btn-danger" onclick="excluirVenda(${i})">Excluir</button>
</div>`;
});

}

function revelarCustos(){
const senha = prompt("Senha:");
if(senha==="DOM"){
mostrarCusto=true;
atualizarTela();
}else{
alert("Senha incorreta");
}
}

atualizarTela();
</script>

</body>
</html>
