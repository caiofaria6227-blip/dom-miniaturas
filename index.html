<script>
let minis = JSON.parse(localStorage.getItem("domMiniaturas")) || [];
let vendas = JSON.parse(localStorage.getItem("domVendas")) || [];
let editIndex = null;
let grafico = null;

function salvarLocal(){
    localStorage.setItem("domMiniaturas", JSON.stringify(minis));
    localStorage.setItem("domVendas", JSON.stringify(vendas));
    atualizarTela();
}

function salvarMini(){
    const nome = document.getElementById("nome").value;
    const linha = document.getElementById("linha").value;
    const valor = parseFloat(document.getElementById("valor").value);
    const quantidade = parseInt(document.getElementById("quantidade").value);
    const fotoInput = document.getElementById("foto");

    if(!nome || !valor || !quantidade){
        alert("Preencha os campos obrigatórios!");
        return;
    }

    const reader = new FileReader();

    reader.onload = function(){
        const nova = {
            nome,
            linha,
            valor,
            quantidade,
            foto: reader.result || (editIndex !== null ? minis[editIndex].foto : null)
        };

        if(editIndex !== null){
            minis[editIndex] = nova;
            editIndex = null;
        } else {
            minis.push(nova);
        }

        salvarLocal();
        limpar();
    }

    if(fotoInput.files[0]){
        reader.readAsDataURL(fotoInput.files[0]);
    } else {
        reader.onload();
    }
}

function atualizarTela(){
    const lista = document.getElementById("lista");
    const busca = document.getElementById("busca").value.toLowerCase();
    const filtro = document.getElementById("filtroLinha").value;
    const totalEstoque = document.getElementById("totalEstoque");

    lista.innerHTML="";
    let total=0;
    let lucro=0;

    minis
    .filter(m => 
        m.nome.toLowerCase().includes(busca) &&
        (filtro=="" || m.linha==filtro)
    )
    .forEach((mini,index)=>{
        total += mini.valor * mini.quantidade;

        lista.innerHTML+=`
        <div class="card">
            ${mini.foto? `<img src="${mini.foto}">`:""}
            <h4>${mini.nome}</h4>
            <p>${mini.linha}</p>
            <p>R$ ${mini.valor.toFixed(2)}</p>
            <p>Qtd: ${mini.quantidade}</p>
            <button class="btn-sell" onclick="vender(${index})">Vendido</button>
            <button class="btn-edit" onclick="editar(${index})">Editar</button>
            <button class="btn-danger" onclick="excluir(${index})">Excluir</button>
        </div>`;
    });

    vendas.forEach(v=>{
        lucro += v.valor;
    });

    totalEstoque.innerHTML=
    "💰 Estoque: R$ "+total.toFixed(2)+
    "<br>📈 Lucro Real: R$ "+lucro.toFixed(2);

    atualizarGrafico(total,lucro);
}

function vender(i){
    if(minis[i].quantidade <= 0){
        alert("Sem estoque!");
        return;
    }

    const cliente = prompt("Nome do cliente:");
    if(!cliente) return;

    const data = prompt("Data da venda (ex: 02/03/2026):");
    if(!data) return;

    minis[i].quantidade--;

    vendas.push({
        nome: minis[i].nome,
        valor: minis[i].valor,
        cliente: cliente,
        data: data
    });

    salvarLocal();
}

function editar(i){
    const m=minis[i];
    document.getElementById("nome").value=m.nome;
    document.getElementById("linha").value=m.linha;
    document.getElementById("valor").value=m.valor;
    document.getElementById("quantidade").value=m.quantidade;
    editIndex=i;
    window.scrollTo(0,0);
}

function excluir(i){
    if(confirm("Excluir miniatura?")){
        minis.splice(i,1);
        salvarLocal();
    }
}

function limpar(){
    document.getElementById("nome").value="";
    document.getElementById("valor").value="";
    document.getElementById("quantidade").value="";
    document.getElementById("foto").value="";
}

function atualizarGrafico(total,lucro){
    const ctx = document.getElementById("grafico").getContext("2d");

    if(grafico) grafico.destroy();

    grafico = new Chart(ctx,{
        type:"bar",
        data:{
            labels:["Estoque","Lucro"],
            datasets:[{
                label:"R$",
                data:[total,lucro]
            }]
        }
    });
}

function exportarBackup(){
    const dados = {
        minis:minis,
        vendas:vendas
    };

    const blob=new Blob([JSON.stringify(dados)],{type:"application/json"});
    const a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download="backup-dom-miniaturas.json";
    a.click();
}

function importarBackup(e){
    const file=e.target.files[0];
    const reader=new FileReader();
    reader.onload=()=>{
        const dados=JSON.parse(reader.result);
        minis=dados.minis || [];
        vendas=dados.vendas || [];
        salvarLocal();
    }
    reader.readAsText(file);
}

async function gerarPDF(){
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    let y=10;

    doc.text("Relatório DOM Miniaturas",10,y);
    y+=10;

    doc.text("Estoque:",10,y);
    y+=8;

    minis.forEach(m=>{
        doc.text(`${m.nome} - ${m.linha} - R$${m.valor} x ${m.quantidade}`,10,y);
        y+=8;
    });

    y+=10;
    doc.text("Vendas:",10,y);
    y+=8;

    vendas.forEach(v=>{
        doc.text(`${v.nome} - R$${v.valor} - ${v.cliente} - ${v.data}`,10,y);
        y+=8;
    });

    doc.save("relatorio-dom-miniaturas.pdf");
}

atualizarTela();
</script>
