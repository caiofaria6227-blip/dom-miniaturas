<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DOM Miniaturas</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(to right,#0f2027,#203a43,#2c5364);
color:white;
}
header{
background:#14532d;
padding:15px;
text-align:center;
font-size:22px;
font-weight:bold;
}
.container{padding:15px;}
input,select{
width:100%;
padding:8px;
margin-bottom:10px;
border:none;
border-radius:8px;
}
button{
padding:8px;
border:none;
border-radius:8px;
cursor:pointer;
margin:4px 2px;
font-weight:bold;
}
.btn-primary{background:#2ecc71;color:white;}
.btn-danger{background:#c0392b;color:white;}
.btn-edit{background:#3498db;color:white;}
.btn-sell{background:#27ae60;color:white;}
.btn-view{background:#f1c40f;}
.card{
background:#166534;
padding:10px;
border-radius:12px;
margin-bottom:10px;
}
.card img{
width:100px;
border-radius:8px;
margin-bottom:8px;
}
canvas{
background:white;
border-radius:10px;
padding:10px;
}
</style>
</head>
<body>

<header>DOM MINIATURAS</header>

<div class="container">

<h3 id="titulo-form">Adicionar Miniatura</h3>

<input type="text" id="nome" placeholder="Nome">

<select id="tipo">
<option>Mainline</option>
<option>Premium</option>
<option>Silver Series</option>
<option>Super Treasure Hunt</option>
<option>Treasure Hunt</option>
<option>Temáticos</option>
<option>Boulevard</option>
<option>Car Culture</option>
<option>Team Transport</option>
<option>Fast & Furious</option>
<option>Matchbox</option>
<option>Outras</option>
</select>

<input type="number" id="custo" placeholder="Custo">
<input type="number" id="venda" placeholder="Valor de venda">
<input type="number" id="quantidade" placeholder="Quantidade">
<input type="file" id="foto">

<button class="btn-primary" id="btn-salvar" onclick="salvarMini()">Adicionar</button>
<button class="btn-view" onclick="revelarCustos()">👁 Ver custos</button>

<hr>

<h3>Filtrar por Tipo</h3>
<select id="filtroTipo" onchange="atualizarTela()">
<option value="Todos">Todos os Tipos</option>
<option>Mainline</option>
<option>Premium</option>
<option>Silver Series</option>
<option>Super Treasure Hunt</option>
<option>Treasure Hunt</option>
<option>Temáticos</option>
<option>Boulevard</option>
<option>Car Culture</option>
<option>Team Transport</option>
<option>Fast & Furious</option>
<option>Matchbox</option>
<option>Outras</option>
</select>

<hr>

<div id="lista"></div>

<hr>

<h3>📊 Investimento Total</h3>
<canvas id="graficoInvestimento"></canvas>

<h3>📈 Lucro Real por Mês</h3>
<canvas id="graficoLucro"></canvas>

<hr>

<h3>🧾 Vendas</h3>

<select id="filtroMesVenda" onchange="atualizarTela()">
<option value="Todos">Todos os meses</option>
</select>

<div id="listaVendas"></div>

</div>

<script>
let minis = JSON.parse(localStorage.getItem("domMiniaturas")) || [];
let vendas = JSON.parse(localStorage.getItem("domVendas")) || [];
let editIndex = null;
let mostrarCusto = false;
let graficoInvestimento;
let graficoLucro;

/* =========================
   FUNÇÃO CONVERSÃO INTERNA
========================= */

function extrairMesAno(data){
if(!data) return null;

const partes = data.split("/");

if(partes.length === 3){
return partes[1] + "/" + partes[2];
}

if(partes.length === 2){
return partes[0] + "/" + partes[1];
}

return null;
}

/* =========================
   SALVAR MINI
========================= */

function salvarLocal(){
localStorage.setItem("domMiniaturas", JSON.stringify(minis));
localStorage.setItem("domVendas", JSON.stringify(vendas));
atualizarTela();
}

/* =========================
   ATUALIZAR TELA
========================= */

function atualizarTela(){

const lista = document.getElementById("lista");
const listaVendas = document.getElementById("listaVendas");
const filtro = document.getElementById("filtroTipo").value;
const filtroMes = document.getElementById("filtroMesVenda").value;

lista.innerHTML="";
listaVendas.innerHTML="";

let investimentoTotal = 0;

/* =========================
   LISTA MINIATURAS
========================= */

minis.forEach((mini,index)=>{

const custo = Number(mini.custo)||0;
const venda = Number(mini.venda)||0;
const qtd = Number(mini.quantidade)||0;

investimentoTotal += custo * qtd;

if(filtro==="Todos" || mini.tipo===filtro){
lista.innerHTML += `
<div class="card">
${mini.foto? `<img src="${mini.foto}">`:""}
<h4>${mini.nome}</h4>
<p><b>${mini.tipo}</b></p>
<p>Venda: R$ ${venda.toFixed(2)}</p>
<p>Custo: ${mostrarCusto? "R$ "+custo.toFixed(2):"****"}</p>
<p>Qtd: ${qtd}</p>
<button class="btn-sell" onclick="vender(${index})">Vendido</button>
<button class="btn-edit" onclick="editar(${index})">Editar</button>
<button class="btn-danger" onclick="excluir(${index})">Excluir</button>
</div>`;
}

});

/* =========================
   GRÁFICO INVESTIMENTO
========================= */

const ctx1 = document.getElementById("graficoInvestimento").getContext("2d");
if(graficoInvestimento) graficoInvestimento.destroy();

graficoInvestimento = new Chart(ctx1,{
type:"bar",
data:{
labels:["Investimento Total"],
datasets:[{
label:"R$",
data:[investimentoTotal]
}]
}
});

/* =========================
   LUCRO POR MÊS
========================= */

let lucroMensal = {};
let mesesUnicos = new Set();

vendas.forEach(v=>{
const mesAno = extrairMesAno(v.data);
if(!mesAno) return;

mesesUnicos.add(mesAno);

if(!lucroMensal[mesAno]) lucroMensal[mesAno]=0;
lucroMensal[mesAno]+=Number(v.lucro)||0;
});

/* Atualiza filtro mês */
const selectMes = document.getElementById("filtroMesVenda");
selectMes.innerHTML='<option value="Todos">Todos os meses</option>';

Array.from(mesesUnicos).sort().forEach(m=>{
selectMes.innerHTML+=`<option value="${m}">${m}</option>`;
});

/* Gráfico lucro */
const ctx2 = document.getElementById("graficoLucro").getContext("2d");
if(graficoLucro) graficoLucro.destroy();

graficoLucro = new Chart(ctx2,{
type:"line",
data:{
labels:Object.keys(lucroMensal),
datasets:[{
label:"Lucro Real",
data:Object.values(lucroMensal)
}]
}
});

/* =========================
   LISTA VENDAS
========================= */

vendas.forEach((v,i)=>{

const mesAno = extrairMesAno(v.data);

if(filtroMes==="Todos" || mesAno===filtroMes){

listaVendas.innerHTML+=`
<div class="card">
<h4>${v.nome}</h4>
<p>Cliente: ${v.cliente}</p>
<p>Data: ${v.data}</p>
<p>Lucro: R$ ${Number(v.lucro).toFixed(2)}</p>
<button class="btn-edit" onclick="editarVenda(${i})">Editar</button>
<button class="btn-danger" onclick="excluirVenda(${i})">Excluir</button>
</div>`;

}

});

}

/* =========================
   EDITAR VENDA
========================= */

function editarVenda(i){

const novaData = prompt("Nova data (DD/MM/AAAA):", vendas[i].data);
if(!novaData) return;

const novoLucro = prompt("Novo lucro:", vendas[i].lucro);
if(novoLucro===null) return;

vendas[i].data = novaData;
vendas[i].lucro = Number(novoLucro)||0;

salvarLocal();
}

/* =========================
   EXCLUIR VENDA
========================= */

function excluirVenda(i){
if(confirm("Excluir venda?")){
vendas.splice(i,1);
salvarLocal();
}
}

atualizarTela();
</script>

</body>
</html>
