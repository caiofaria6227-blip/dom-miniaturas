<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DOM Miniaturas</title>

<link rel="manifest" href="manifest.json">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#1f3d2b;
    color:white;
}
header{
    background:#14281d;
    padding:15px;
    text-align:center;
    font-size:22px;
    font-weight:bold;
}
.container{ padding:15px; }

input, select{
    width:100%;
    padding:8px;
    margin-bottom:10px;
    border:none;
    border-radius:8px;
}

button{
    padding:8px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    margin:4px 2px;
    font-weight:bold;
}

.btn-primary{ background:#f4c430; }
.btn-danger{ background:#c0392b; color:white; }
.btn-edit{ background:#3498db; color:white; }
.btn-sell{ background:#27ae60; color:white; }
.btn-view{ background:#8e44ad; color:white; }

.card{
    background:#2e5b3c;
    padding:10px;
    border-radius:12px;
    margin-bottom:10px;
}

.card img{
    width:120px;
    border-radius:8px;
    display:block;
    margin-bottom:8px;
}

canvas{
    background:white;
    border-radius:10px;
    padding:10px;
}

.ranking{
    background:#244a33;
    padding:10px;
    border-radius:10px;
}
</style>
</head>

<body>

<header>DOM MINIATURAS</header>

<div class="container">

<h3>Adicionar Miniatura</h3>

<input type="text" id="nome" placeholder="Nome">

<select id="tipo">
<option>Mainline</option>
<option>Premium</option>
<option>Silver Series</option>
<option>Super Treasure Hunt</option>
<option>Treasure Hunt</option>
<option>Temáticos</option>
<option>Boulevard</option>
<option>Car Culture</option>
<option>Team Transport</option>
<option>Fast & Furious</option>
<option>Matchbox</option>
<option>Outras</option>
</select>

<input type="number" id="custo" placeholder="Quanto paguei (custo)">
<input type="number" id="venda" placeholder="Quanto vou vender">
<input type="number" id="quantidade" placeholder="Quantidade">
<input type="file" id="foto">

<button class="btn-primary" onclick="salvarMini()">Salvar</button>

<hr>

<button class="btn-view" onclick="mostrarCustos()">👁 Ver custos</button>

<hr>

<div id="lista"></div>

<hr>

<h3>📊 Potencial e Lucro</h3>
<p id="resumo"></p>
<canvas id="grafico"></canvas>

<hr>

<h3>🏆 Ranking Linhas + Lucrativas</h3>
<div class="ranking" id="ranking"></div>

</div>

<script>
let minis = JSON.parse(localStorage.getItem("domMiniaturas")) || [];
let editIndex = null;
let grafico = null;
let mostrarCusto = false;

function salvarLocal(){
    localStorage.setItem("domMiniaturas", JSON.stringify(minis));
    atualizarTela();
}

function salvarMini(){
    const nome = document.getElementById("nome").value;
    const tipo = document.getElementById("tipo").value;
    const custo = parseFloat(document.getElementById("custo").value);
    const venda = parseFloat(document.getElementById("venda").value);
    const quantidade = parseInt(document.getElementById("quantidade").value);
    const fotoInput = document.getElementById("foto");

    if(!nome || !venda || !quantidade){
        alert("Preencha os campos obrigatórios!");
        return;
    }

    const reader = new FileReader();

    reader.onload = function(){
        const nova = {
            nome,
            tipo,
            custo: custo || 0,
            venda,
            quantidade,
            foto: reader.result || null
        };

        if(editIndex !== null){
            minis[editIndex] = nova;
            editIndex = null;
        } else {
            minis.push(nova);
        }

        salvarLocal();
        limpar();
    }

    if(fotoInput.files[0]){
        reader.readAsDataURL(fotoInput.files[0]);
    } else {
        reader.onload();
    }
}

function atualizarTela(){
    const lista = document.getElementById("lista");
    const resumo = document.getElementById("resumo");
    const rankingDiv = document.getElementById("ranking");

    lista.innerHTML="";
    let potencial=0;
    let lucroTotal=0;
    let ranking={};

    minis.forEach((mini,index)=>{
        const lucroUnit = mini.venda - mini.custo;
        const lucro = lucroUnit * mini.quantidade;
        potencial += mini.venda * mini.quantidade;
        lucroTotal += lucro;

        if(!ranking[mini.tipo]) ranking[mini.tipo]=0;
        ranking[mini.tipo]+=lucro;

        lista.innerHTML+=`
        <div class="card">
            ${mini.foto? `<img src="${mini.foto}">`:""}
            <h4>${mini.nome}</h4>
            <p><b>${mini.tipo}</b></p>
            <p>Venda: R$ ${mini.venda.toFixed(2)}</p>
            <p>Custo: ${mostrarCusto ? "R$ "+mini.custo.toFixed(2) : "****"}</p>
            <p>Qtd: ${mini.quantidade}</p>
            <p>Lucro unit: R$ ${lucroUnit.toFixed(2)}</p>
            <button class="btn-edit" onclick="editar(${index})">Editar</button>
            <button class="btn-danger" onclick="excluir(${index})">Excluir</button>
        </div>`;
    });

    resumo.innerText = "Potencial: R$ "+potencial.toFixed(2)+" | Lucro estimado: R$ "+lucroTotal.toFixed(2);

    atualizarGrafico(potencial,lucroTotal);

    rankingDiv.innerHTML="";
    Object.entries(ranking)
    .sort((a,b)=>b[1]-a[1])
    .forEach(([linha,valor])=>{
        rankingDiv.innerHTML+= `<p>${linha}: R$ ${valor.toFixed(2)}</p>`;
    });
}

function mostrarCustos(){
    const senha = prompt("Digite a senha:");
    if(senha==="DOM"){
        mostrarCusto=true;
        atualizarTela();
    } else {
        alert("Senha incorreta");
    }
}

function editar(i){
    const m=minis[i];
    document.getElementById("nome").value=m.nome;
    document.getElementById("tipo").value=m.tipo;
    document.getElementById("custo").value=m.custo;
    document.getElementById("venda").value=m.venda;
    document.getElementById("quantidade").value=m.quantidade;
    editIndex=i;
}

function excluir(i){
    minis.splice(i,1);
    salvarLocal();
}

function limpar(){
    document.getElementById("nome").value="";
    document.getElementById("custo").value="";
    document.getElementById("venda").value="";
    document.getElementById("quantidade").value="";
    document.getElementById("foto").value="";
}

function atualizarGrafico(potencial,lucro){
    const ctx = document.getElementById("grafico").getContext("2d");

    if(grafico) grafico.destroy();

    grafico = new Chart(ctx,{
        type:"bar",
        data:{
            labels:["Potencial","Lucro"],
            datasets:[{
                label:"R$",
                data:[potencial,lucro]
            }]
        }
    });
}

atualizarTela();
</script>

</body>
</html>
